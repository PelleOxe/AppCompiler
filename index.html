    <!-- Anpassade CSS-stilar från index.css -->
    <style type="text/tailwindcss">
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');
@import "tailwindcss";

@variant dark (&:where(.dark, .dark *));

@theme {
  --font-sans: "Outfit", ui-sans-serif, system-ui, sans-serif;
  --font-mono: "JetBrains Mono", ui-monospace, SFMono-Regular, monospace;
  --color-elegant-bg: #0B0E14;
  --color-elegant-header: #11141B;
  --color-elegant-border: #1A1F26;
  --color-elegant-input: #050608;
  --color-elegant-input-border: #232933;
}

/* Force minimum font size of 11px on all elements */
html, body {
  font-family: var(--font-sans);
  font-size: 16px;
}

* {
  min-size: 11px;
}

/* Glass styling for Elegant Dark theme */
.glass {
  background: rgba(255, 255, 255, 0.03);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.05);
}

.dark .glass {
  background: rgba(255, 255, 255, 0.02);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255, 255, 255, 0.04);
}

/* Custom button press bounce effect */
.btn-press {
  transition: transform 80ms cubic-bezier(0.4, 0, 0.2, 1), box-shadow 80ms ease, filter 80ms ease;
}

.btn-press:active {
  transform: translateY(2px) scale(0.97) !important;
  box-shadow: 0 1px 2px rgba(0, 0, 0, 0.5) !important;
}

  <body class="h-full bg-slate-50 text-slate-900 transition-colors duration-200">

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then(reg => console.log('Service Worker registrerad!', reg))
            .catch(err => console.log('Service Worker misslyckades:', err));
        });
      }
    </script>
  
    <!-- Registrera Service Worker för PWA-installationsstöd och offline-läge -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then(reg => console.log('Service Worker registrerad för appen!', reg))
            .catch(err => console.log('Service Worker misslyckades:', err));
        });
      }
    </script>
